<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nezha v0.5.0</title>
<style>
:root {
  --bg:#090911;--bg0:#0e0e1c;--bg1:#131326;--sidebar:#0d0d1e;
  --border:#1a1a35;--border2:#222240;--text:#e0e0f0;--text2:#b0b0c8;
  --dim:#5a5a7a;--accent:#ff3366;--accent2:#e6224f;
  --accent-glow:rgba(255,51,102,.15);--hover:#181835;--input:#0c0c1e;
  --card:#111128;--card2:#151530;--green:#00cc88;--blue:#4488ff;
  --orange:#ff9922;--purple:#aa55ff;--radius:10px;--radius-lg:14px;
  --transition:.2s cubic-bezier(.4,0,.2,1);
  --code-bg:#0a0a1a;--code-border:#1e1e3a;
}
[data-theme=light] {
  --bg:#f4f4f8;--bg0:#eeeef4;--bg1:#e6e6ee;--sidebar:#fafafd;
  --border:#e0e0ea;--border2:#d0d0dd;--text:#1a1a2e;--text2:#555;
  --dim:#999;--accent:#e6224f;--accent2:#cc1144;
  --accent-glow:rgba(230,34,79,.08);--hover:#f0f0f6;--input:#fff;
  --card:#fff;--card2:#f8f8fc;--green:#00aa77;--blue:#3366dd;
  --orange:#ee8811;--purple:#8844dd;
  --code-bg:#f5f5fa;--code-border:#e0e0ea;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* === Header === */
.header{height:48px;background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;z-index:10}
.header .logo{display:flex;align-items:center;gap:8px}
.header .logo-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple) 70%);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;box-shadow:0 2px 8px var(--accent-glow)}
.header h1{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.header .ver{font-size:9px;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:.3px}
.header .spacer{flex:1}
.hbtn{padding:5px 11px;border:1px solid var(--border);border-radius:var(--radius);background:none;color:var(--dim);cursor:pointer;font-size:11px;font-weight:500;transition:var(--transition);white-space:nowrap}
.hbtn:hover{background:var(--hover);color:var(--text);border-color:var(--border2)}
.hbtn:active{transform:scale(.96)}

/* Toggle sidebar */
.menu-toggle{display:none;width:32px;height:32px;border:none;background:none;color:var(--text);cursor:pointer;font-size:18px;border-radius:var(--radius);align-items:center;justify-content:center}
.menu-toggle:hover{background:var(--hover)}

/* === Layout === */
.body{display:flex;flex:1;min-height:0;position:relative}

/* === Sidebar === */
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s ease,width .25s ease;z-index:5}
.sidebar-head{padding:10px 10px 6px;display:flex;gap:4px}
.sidebar-head button{flex:1;padding:7px 4px;border:1px solid var(--border);border-radius:var(--radius);background:none;color:var(--text);cursor:pointer;font-size:11px;font-weight:500;transition:var(--transition);white-space:nowrap}
.sidebar-head button:hover{background:var(--hover);border-color:var(--accent);color:var(--accent)}
.sidebar-head button.pri{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.sidebar-head button.pri:hover{background:var(--accent2)}

/* Tabs */
.tab-bar{display:flex;padding:0 10px 6px;gap:2px}
.tab-btn{flex:1;padding:7px 0;text-align:center;font-size:11px;color:var(--dim);cursor:pointer;border-radius:var(--radius);transition:var(--transition);font-weight:500;position:relative}
.tab-btn:hover{color:var(--text);background:var(--hover)}
.tab-btn.active{color:var(--accent);background:var(--accent-glow);font-weight:700}
.tab-btn .tab-icon{display:block;font-size:15px;margin-bottom:1px}

.list{flex:1;overflow-y:auto;padding:4px 8px}
.list-hint{padding:12px;color:var(--dim);font-size:12px;text-align:center}

/* Sidebar items */
.item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;font-size:12px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;transition:var(--transition);line-height:1.3;border:1px solid transparent}
.item:hover{background:var(--hover);border-color:var(--border)}
.item.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 12px var(--accent-glow)}
.item .item-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
.item .item-sub{font-size:10px;opacity:.45;margin-top:1px}
.item.active .item-sub{opacity:.6}
.item .x{display:none;margin-left:6px;cursor:pointer;font-size:14px;opacity:.5;width:16px;text-align:center}
.item:hover .x{display:block}
.item.active .x{color:#fff;opacity:.7}

/* Sidebar footer */
.sidebar-foot{padding:8px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--dim);line-height:1.6}

/* === Chat area === */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.model-bar{padding:6px 20px;border-bottom:1px solid var(--border);background:var(--sidebar);display:flex;align-items:center;gap:8px;font-size:11px}
.model-bar .cur-model{color:var(--accent);font-weight:600}
.model-bar select{background:var(--input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;padding:4px 8px;cursor:pointer;outline:none}
.model-bar select:focus{border-color:var(--accent)}
.model-bar .pipe-badge{font-size:9px;background:var(--accent-glow);color:var(--accent);padding:2px 7px;border-radius:4px;font-weight:600}

.chat{flex:1;overflow-y:auto;padding:20px 24px;scroll-behavior:smooth}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--dim)}
.empty .logo-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--purple) 70%);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800;margin-bottom:4px;box-shadow:0 8px 32px var(--accent-glow)}
.empty .logo-text{font-size:24px;font-weight:700;color:var(--text)}
.empty .hint{font-size:13px;color:var(--dim)}
.empty .shortcuts{margin-top:4px;display:flex;gap:12px;font-size:10.5px;color:var(--dim)}
.empty .shortcuts kbd{padding:2px 7px;border-radius:4px;background:var(--bg1);border:1px solid var(--border);font-family:inherit}

/* === Messages === */
.msg{margin-bottom:18px;max-width:80%;animation:msgIn .3s var(--transition)}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.msg.user{margin-left:auto}
.msg .avatar{width:32px;height:32px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);float:left;margin-right:10px;margin-top:2px}
.msg.user .avatar{float:right;margin-left:10px;margin-right:0}
.msg .msg-body{overflow:hidden}
.msg .bubble{padding:12px 16px;border-radius:var(--radius-lg);font-size:13.5px;line-height:1.7;word-wrap:break-word}
.msg.user .bubble{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:6px;box-shadow:0 2px 12px var(--accent-glow)}
.msg.assistant .bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:6px}
.msg .meta{font-size:9px;opacity:.35;margin-top:4px;clear:both}
.msg.user .meta{text-align:right}

/* Markdown inside bubbles */
.bubble p{margin:0 0 6px}
.bubble p:last-child{margin-bottom:0}
.bubble strong,.bubble b{color:inherit;font-weight:700}
.bubble em,.bubble i{opacity:.85}
.bubble ul,.bubble ol{padding-left:20px;margin:6px 0}
.bubble li{margin:2px 0}
.bubble a{color:var(--blue);text-decoration:underline}
.bubble blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:8px 0;opacity:.8;font-style:italic}
.bubble hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.bubble h1,.bubble h2,.bubble h3{font-size:1.1em;margin:10px 0 4px;font-weight:700}
.bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:12px}
.bubble th,.bubble td{border:1px solid var(--border);padding:4px 8px;text-align:left}
.bubble th{background:var(--bg1)}

/* Code blocks */
.bubble code{font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;font-size:.9em;background:var(--code-bg);padding:2px 5px;border-radius:4px;border:1px solid var(--code-border)}
.bubble pre{background:var(--code-bg);border:1px solid var(--code-border);border-radius:8px;padding:14px 16px;overflow-x:auto;margin:8px 0;position:relative}
.bubble pre code{background:none;border:none;padding:0;font-size:.85em;line-height:1.5}
.bubble .code-lang{position:absolute;top:4px;right:8px;font-size:9px;color:var(--dim);text-transform:uppercase}
.bubble .copy-code{position:absolute;top:4px;right:48px;font-size:9px;color:var(--dim);cursor:pointer;border:none;background:none;opacity:.5;transition:opacity .15s}
.bubble .copy-code:hover{opacity:1}

/* Typing */
.typing-indicator{display:flex;align-items:center;gap:4px;padding:8px 16px;color:var(--dim);font-size:12px;opacity:.6}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);animation:typeBounce 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typeBounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-4px);opacity:1}}

/* === Input === */
.input-area{padding:12px 18px 14px;border-top:1px solid var(--border);background:var(--sidebar);display:flex;gap:8px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--input);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;color:var(--text);font-size:13.5px;resize:none;font-family:inherit;min-height:42px;max-height:160px;outline:none;transition:var(--transition);line-height:1.5}
.input-area textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.input-area textarea::placeholder{color:var(--dim)}
.input-area button{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--radius-lg);padding:0 20px;cursor:pointer;font-size:13px;font-weight:600;height:42px;transition:var(--transition);white-space:nowrap;box-shadow:0 2px 12px var(--accent-glow)}
.input-area button:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-glow)}
.input-area button:active{transform:translateY(0)}
.input-area button:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.upload-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:var(--radius-lg);background:var(--card);border:1px solid var(--border);color:var(--dim);cursor:pointer;font-size:16px;transition:var(--transition);flex-shrink:0}
.upload-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--hover)}

/* File strip */
.file-strip{display:none;padding:6px 18px;border-top:1px solid var(--border);background:var(--sidebar);overflow-x:auto;white-space:nowrap}
.file-strip.active{display:flex;gap:6px;align-items:center}
.file-chip{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text2);max-width:180px}
.file-chip .remove{cursor:pointer;color:var(--dim);font-size:13px;transition:color .15s}
.file-chip .remove:hover{color:var(--accent)}
.file-chip .fname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-badge{font-size:9px;background:var(--accent-glow);color:var(--accent);padding:1px 4px;border-radius:3px;margin-left:2px}

/* === Modals === */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:480px;max-height:82vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal h2{font-size:17px;margin-bottom:18px;color:var(--text);font-weight:700}
.modal label{display:block;font-size:11px;color:var(--dim);margin:12px 0 5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 13px;background:var(--input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:var(--transition)}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.modal textarea{min-height:80px;resize:vertical}
.modal .btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal .btns button{padding:9px 20px;border-radius:var(--radius);cursor:pointer;font-size:12.5px;font-weight:600;border:1px solid var(--border);transition:var(--transition)}
.modal .btns .pri{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);color:#fff}
.modal .btns .pri:hover{opacity:.9;transform:translateY(-1px)}
.modal .btns .sec{background:none;color:var(--text)}
.modal .btns .sec:hover{background:var(--hover)}
.ag-list{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:6px}
.ag-check{display:block;padding:5px 8px;cursor:pointer;border-radius:4px;font-size:13px;transition:.12s}
.ag-check:hover{background:var(--bg0)}
.ag-check input{margin-right:8px;accent-color:var(--accent)}

/* List items in modals */
.mem-item{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px}
.mem-item .time{font-size:10px;opacity:.4}
.mem-item .text{font-size:12.5px;margin-top:3px;line-height:1.4}
.task-item{padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;transition:var(--transition)}
.task-item:hover{border-color:var(--border2)}
.task-item .name{font-weight:600;font-size:13px}
.task-item .meta{font-size:10px;opacity:.45;margin-top:3px}
.task-item .toggle{padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;font-size:10.5px;font-weight:600;transition:var(--transition);background:none;color:var(--dim)}
.task-item .toggle:hover{border-color:var(--accent);color:var(--accent)}

/* Type badges */
.type-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.3px}
.type-badge.seq{background:rgba(51,153,255,.15);color:var(--blue)}
.type-badge.loop{background:rgba(255,153,34,.15);color:var(--orange)}
.type-badge.bcast{background:rgba(170,85,255,.15);color:var(--purple)}
.type-badge.ifelse{background:rgba(0,204,136,.15);color:var(--green)}
.type-badge.gc{background:rgba(255,51,102,.15);color:var(--accent)}

/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:150;animation:fadeIn .2s ease}
.confirm-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 32px;width:380px;box-shadow:0 16px 48px rgba(0,0,0,.4);animation:modalIn .25s ease;text-align:center}
.confirm-box .icon{font-size:44px;margin-bottom:14px;display:block;line-height:1}
.confirm-box .title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px}
.confirm-box .msg{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:22px}
.confirm-box .btns{display:flex;gap:10px;justify-content:center}
.confirm-box .btns button{padding:9px 28px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;transition:var(--transition);border:1px solid var(--border)}
.confirm-box .btns .cancel-btn{background:var(--bg1);color:var(--text)}
.confirm-box .btns .cancel-btn:hover{background:var(--hover);border-color:var(--border2)}
.confirm-box .btns .del-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
.confirm-box .btns .del-btn:hover{transform:translateY(-1px);box-shadow:0 4px 18px var(--accent-glow)}

/* Persona cards */
.persona-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s}
.persona-card:hover{background:var(--hover);border-color:var(--accent);transform:translateY(-1px)}
.persona-card.active{border-color:var(--accent);background:var(--accent-glow);box-shadow:0 0 0 1px var(--accent)}
.persona-card.active .persona-name::after{content:' ✓';color:var(--accent);font-size:11px}
.persona-name{font-size:12px;font-weight:600;color:var(--text)}
.persona-desc{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.5;max-width:100%}
.persona-indicator{display:inline-flex;align-items:center;gap:4px;background:var(--accent-glow);border:1px solid var(--accent);border-radius:12px;padding:2px 10px;font-size:10px;color:var(--accent);margin-left:6px}

/* Artifact buttons */
.artifact-area{padding:4px 18px;border-top:1px solid var(--border);background:var(--sidebar);display:flex;gap:6px;flex-wrap:wrap}
.artifact-btn{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .2s}
.artifact-btn:hover{background:var(--hover);border-color:var(--accent);color:var(--accent)}
.artifact-tag{font-size:9px;background:var(--accent-glow);color:var(--accent);padding:1px 5px;border-radius:3px;margin-left:4px}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* Toast */
.toast-container{position:fixed;top:60px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{pointer-events:auto;padding:10px 18px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);font-size:12.5px;color:var(--text);box-shadow:0 8px 28px rgba(0,0,0,.3);animation:toastIn .25s ease;max-width:340px}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
.toast.success{border-color:var(--green);background:rgba(0,204,136,.08)}
.toast.error{border-color:var(--accent);background:var(--accent-glow)}

/* === Pipeline type cards === */
.pipe-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.pipe-type-card{padding:14px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:center;transition:all .2s;background:var(--bg0)}
.pipe-type-card:hover{border-color:var(--border2);background:var(--hover);transform:translateY(-1px)}
.pipe-type-card.selected{border-color:var(--accent);background:var(--accent-glow);box-shadow:0 0 0 1px var(--accent)}
.pipe-type-card .pt-icon{font-size:26px;display:block;margin-bottom:6px}
.pipe-type-card .pt-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.pipe-type-card .pt-desc{font-size:10px;color:var(--dim);line-height:1.4}
.pipe-type-card.seq-col{border-left:3px solid var(--blue)}
.pipe-type-card.loop-col{border-left:3px solid var(--orange)}
.pipe-type-card.bcast-col{border-left:3px solid var(--purple)}
.pipe-type-card.ifelse-col{border-left:3px solid var(--green)}
.pipe-type-card.gc-col{border-left:3px solid var(--accent)}

/* === Pipeline flow preview === */
.pipe-flow{margin:12px 0;padding:12px;border-radius:var(--radius);background:var(--bg0);border:1px dashed var(--border);display:flex;align-items:center;gap:0;flex-wrap:wrap;min-height:44px;justify-content:center}
.pipe-flow .flow-node{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;background:var(--card);border:1px solid var(--border);color:var(--text)}
.pipe-flow .flow-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pipe-flow .flow-arrow{color:var(--dim);font-size:16px;margin:0 2px;font-weight:300}
.pipe-flow .flow-plus{color:var(--dim);font-size:13px;margin:0 3px;font-weight:300}
.pipe-flow .flow-empty{color:var(--dim);font-size:11px}
.pipe-flow .flow-loop-label{font-size:9px;color:var(--orange);font-weight:600;margin:0 2px}

/* === Agent order list === */
.agent-order-list{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:8px}
.agent-order-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg0);transition:background .15s;cursor:default}
.agent-order-item:last-child{border-bottom:none}
.agent-order-item:hover{background:var(--hover)}
.agent-order-item .ao-handle{cursor:grab;color:var(--dim);font-size:13px;user-select:none;padding:0 2px;letter-spacing:1px}
.agent-order-item .ao-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.agent-order-item .ao-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.agent-order-item .ao-idx{font-size:10px;color:var(--dim);margin-right:4px;min-width:16px}
.agent-order-item .ao-btns{display:flex;gap:2px}
.agent-order-item .ao-btn{padding:3px 7px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--dim);cursor:pointer;font-size:11px;transition:all .15s}
.agent-order-item .ao-btn:hover{background:var(--hover);color:var(--text);border-color:var(--border2)}
.agent-order-item .ao-btn.ao-rm:hover{color:var(--accent);border-color:var(--accent)}
.agent-order-hint{font-size:10px;color:var(--dim);margin-top:4px}

/* === Type-specific config panel === */
.pipe-config-panel{margin:8px 0;padding:12px;border-radius:var(--radius);background:var(--bg0);border:1px solid var(--border);animation:cfgIn .2s ease}
@keyframes cfgIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.pipe-config-panel label{font-size:10px;color:var(--dim);margin:6px 0 3px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.pipe-config-panel label:first-child{margin-top:0}
.pipe-config-panel input,.pipe-config-panel select{width:100%;padding:8px 10px;background:var(--input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:var(--transition)}
.pipe-config-panel input:focus,.pipe-config-panel select:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.pipe-config-panel .hint{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.4}
.pipe-config-panel .config-row{display:flex;gap:8px}
.pipe-config-panel .config-row>div{flex:1}

/* Wider modal for pipeline creation */
.modal-wide{width:560px}

/* Agent checkbox grid */
.ag-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;max-height:140px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:5px}
.ag-grid .ag-check{padding:5px 8px;cursor:pointer;border-radius:4px;font-size:12px;transition:.12s;display:flex;align-items:center;gap:6px}
.ag-grid .ag-check:hover{background:var(--bg0)}
.ag-grid .ag-check input{margin:0;accent-color:var(--accent)}
.ag-grid .ag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* === Mention bar === */
.mention-bar{display:none;padding:4px 18px;border-bottom:1px solid var(--border);background:var(--sidebar);gap:6px;align-items:center;flex-wrap:wrap}
.mention-bar.active{display:flex}
.mention-bar .mention-label{font-size:10px;color:var(--dim);margin-right:2px;white-space:nowrap}
.mention-chip{padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.mention-chip:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px)}
.mention-chip .mc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* @mention highlight in messages */
.mention-highlight{color:var(--accent);font-weight:700;background:var(--accent-glow);padding:1px 4px;border-radius:3px}

/* === Responsive === */
@media(max-width:768px){
  .menu-toggle{display:flex}
  .sidebar{position:absolute;top:0;left:0;bottom:0;transform:translateX(-100%);width:260px;z-index:20;box-shadow:4px 0 20px rgba(0,0,0,.3)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:15}
  .sidebar-overlay.show{display:block}
  .msg{max-width:92%}
  .model-bar{padding:6px 12px}
  .chat{padding:16px 12px}
  .input-area{padding:10px 12px 12px}
  .header{padding:0 10px}
}
</style>
</head>
<body>
<!-- Header -->
<div class="header">
  <button class="menu-toggle" onclick="toggleSidebar()" title="Menu">☰</button>
  <div class="logo"><div class="logo-icon">N</div><h1>Nezha</h1><span class="ver">v0.5.0</span></div>
  <div class="spacer"></div>
  <button class="hbtn" onclick="showSettings()">⚙ <span id="hdrSettings">Settings</span></button>
  <button class="hbtn" onclick="showMemory()">🧠 <span id="hdrMemory">Memory</span></button>
  <button class="hbtn" onclick="showTasks()">⏰ <span id="hdrTasks">Tasks</span></button>
  <button class="hbtn" onclick="toggleTheme()">🌓 <span id="hdrTheme">Theme</span></button>
  <button class="hbtn" onclick="toggleLang()">🌐 <span id="langLabel">EN</span></button>
</div>

<div class="body">
  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <button class="pri" onclick="newSession()">＋ <span id="btnNewChat">New Chat</span></button>
      <button onclick="showAddModal('agent')">＋ <span id="btnAddAgent">Agent</span></button>
      <button onclick="showAddModal('pipe')">＋ <span id="btnAddPipe">Pipe</span></button>
    </div>
    <div class="tab-bar">
      <div class="tab-btn active" id="tab-sessions" onclick="switchTab('sessions')"><span class="tab-icon">💬</span><span id="tabLabelSessions">Chats</span></div>
      <div class="tab-btn" id="tab-agents" onclick="switchTab('agents')"><span class="tab-icon">🤖</span><span id="tabLabelAgents">Agents</span></div>
      <div class="tab-btn" id="tab-pipes" onclick="switchTab('pipes')"><span class="tab-icon">🔀</span><span id="tabLabelPipes">Pipes</span></div>
      <div class="tab-btn" id="tab-personas" onclick="switchTab('personas')"><span class="tab-icon">🎭</span><span id="tabLabelPersonas">Persona</span></div>
    </div>
    <div class="list" id="listArea"></div>
    <div class="sidebar-foot" id="sidebarFoot">
      <kbd>Enter</kbd> <span id="footSend">发送</span> &nbsp; <kbd>Shift+Enter</kbd> <span id="footNewline">换行</span>
    </div>
  </div>

  <!-- Main chat -->
  <div class="main">
    <div class="model-bar" id="modelBar" style="display:none">
      <span id="modeIndicator"></span>
      <span id="modelLabelText">· 模型:</span>
      <select id="modelSelect" onchange="switchModel(this.value)"></select>
    </div>
    <div class="mention-bar" id="mentionBar"><span class="mention-label">@</span></div>
    <div class="chat" id="chatArea">
      <div class="empty">
        <div class="logo-icon">N</div>
        <div class="logo-text">Nezha</div>
        <div class="hint" id="emptyHint">选择一个智能体或编排开始对话</div>
        <div class="shortcuts"><kbd>Enter</kbd> Send &nbsp; <kbd>Shift+Enter</kbd> New line</div>
      </div>
    </div>
    <div id="artifactArea" class="artifact-area" style="display:none"></div>
    <div class="file-strip" id="fileStrip"></div>
    <div class="input-area">
      <label class="upload-btn" title="Upload file">📎<input type="file" id="fileInput" style="display:none" multiple onchange="handleFiles(this.files)"></label>
      <textarea id="msgInput" rows="1" placeholder="Type a message... (Enter to send)"></textarea>
      <button id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</div>

<div id="modal"></div>
<div class="toast-container" id="toasts"></div>

<script>
// ============ STATE ============
var curAgent=null,curPipe=null,curSess=null,curTab='sessions',curModel=null;
var lang=localStorage.getItem('nz-lang')||'zh';
var activePersona=null,pendingFiles=[];

// ============ i18n ============
var I={
zh:{

  emptyHintDefault:'Select an agent or pipeline to start chatting',
  hdrSettings:'Settings',hdrMemory:'Memory',hdrTasks:'Tasks',hdrTheme:'Theme',
  pipeTypeSeqDesc:'Chain multiple agents in sequence, each output feeds the next input',
  pipeTypeLoopDesc:'Repeatedly call an agent until exit condition is met or max iterations reached',
  pipeTypeBcastDesc:'Send the same message to all agents and collect all replies',

  atMention:'Mention'
}};
function T(k){return I[lang][k]||k}

// ============ UTILS ============
function api(m,u,b){var o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);return fetch(u,o).then(function(r){return r.json()})}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function $V(id){var el=document.getElementById(id);return el?el.value:''}
function typeClass(t){return{'sequential':'seq','loop':'loop','broadcast':'bcast','ifelse':'ifelse','groupchat':'gc'}[t]||'seq'}
function agentColor(name){
  var colors=['#ff3366','#3399ff','#00cc88','#ff9922','#aa55ff','#ff6688','#44aaff','#22ddaa','#ffbb44','#cc77ff'];
  var hash=0;for(var i=0;i<name.length;i++)hash=((hash<<5)-hash)+name.charCodeAt(i);
  return colors[Math.abs(hash)%colors.length];
}
var _confirmCb=null;

// ============ TOAST ============
function toast(msg,type){
  var el=document.createElement('div');el.className='toast'+(type?' '+type:'');el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(function(){el.remove()},300)},2500);
}

// ============ THEME & LANG ============
function toggleTheme(){
  var t=document.documentElement.getAttribute('data-theme')==='light'?'':'light';
  document.documentElement.setAttribute('data-theme',t);localStorage.setItem('nz-theme',t);
}
function toggleLang(){
  lang=lang==='zh'?'en':'zh';localStorage.setItem('nz-lang',lang);
  document.getElementById('langLabel').textContent=lang==='zh'?'EN':'中';
  renderUI();switchTab(curTab);
}
if(localStorage.getItem('nz-theme')==='light')document.documentElement.setAttribute('data-theme','light');

function renderUI(){
  document.getElementById('msgInput').placeholder=T('typeMsg');
  document.getElementById('sendBtn').textContent=T('send');
  document.getElementById('btnNewChat').textContent=T('newChat');
  document.getElementById('btnAddAgent').textContent=T('addAgent');
  document.getElementById('btnAddPipe').textContent=T('addPipe');
  document.getElementById('tabLabelSessions').textContent=T('chatTab');
  document.getElementById('tabLabelAgents').textContent=T('agentsTab');
  document.getElementById('tabLabelPipes').textContent=T('pipesTab');
  document.getElementById('tabLabelPersonas').textContent=T('personaTab');
  document.getElementById('hdrSettings').textContent=T('hdrSettings');
  document.getElementById('hdrMemory').textContent=T('hdrMemory');
  document.getElementById('hdrTasks').textContent=T('hdrTasks');
  document.getElementById('hdrTheme').textContent=T('hdrTheme');
  document.getElementById('footSend').textContent=T('footSend');
  document.getElementById('footNewline').textContent=T('footNewline');
  document.getElementById('modelLabelText').textContent='· '+T('modelLabel')+':';
  document.getElementById('langLabel').textContent=lang==='zh'?'EN':'中';
  // Update empty state if showing
  if(curAgent||curPipe)updateModelBar();else showEmpty();
}

// ============ SIDEBAR ============
function toggleSidebar(){
  var s=document.getElementById('sidebar'),o=document.getElementById('sidebarOverlay');
  s.classList.toggle('open');o.classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

function switchTab(tab){
  curTab=tab;closeSidebar();
  ['sessions','agents','pipes','personas'].forEach(function(t){
    document.getElementById('tab-'+t).className='tab-btn'+(tab===t?' active':'');
  });
  if(tab==='sessions')loadSessions();
  else if(tab==='agents')loadAgents();
  else if(tab==='pipes')loadPipes();
  else if(tab==='personas')loadPersonas();
}

// ============ SESSIONS ============
function newSession(){
  var body={agentName:(curPipe||curAgent)||'Assistant'};
  if(curPipe)body.pipelineName=curPipe;
  api('POST','/api/sessions',body).then(function(d){
    curSess=d.id;updateModelBar();
    loadSessions();loadMsgs();
  });
}
function loadSessions(){
  api('GET','/api/sessions').then(function(d){
    var list=d.sessions||[],el=document.getElementById('listArea');
    if(curTab!=='sessions')return;
    el.innerHTML='';
    if(list.length===0){el.innerHTML='<div class="list-hint">'+T('noChats')+'</div>';return}
    list.forEach(function(s){
      var div=document.createElement('div');
      div.className='item'+(curSess===s.id?' active':'');
      var preview=s.lastMessage||'';
      var title=s.title||'New Chat';
      // Use last user message as visible title if available, otherwise fallback to session title
      var displayTitle=preview||title;
      if(displayTitle.length>40)displayTitle=displayTitle.substring(0,40)+'...';
      var sub=(s.pipelineName?'🔀 ':s.agentName||'')+' · '+new Date(s.updatedAt).toLocaleString();
      var badge=s.pipelineName?'<span class="type-badge bcast">'+esc(s.pipelineName)+'</span>':'';
      div.innerHTML='<div><div class="item-title">'+badge+esc(displayTitle)+'</div><div class="item-sub">'+esc(sub)+'</div></div><span class="x" onclick="event.stopPropagation();delSess('+s.id+')">×</span>';
      div.onclick=function(){
        curSess=s.id;curAgent=s.pipelineName?null:s.agentName;curPipe=s.pipelineName||null;
        updateModelBar();loadSessions();loadMsgs();loadArtifacts();
      };
      el.appendChild(div);
    });
  });
}
function delSess(id){
  askConfirm(T('deleteConfirm'),T('deleteWarn'),function(){
    api('DELETE','/api/sessions/'+id).then(function(){
      if(curSess===id){curSess=null;curAgent=null;curPipe=null;updateModelBar();showEmpty()}
      loadSessions();toast(T('sessDeleted'),'success');
    });
  });
}

// ============ AGENTS ============
function loadAgents(){
  api('GET','/api/agents').then(function(ad){
    api('GET','/api/sessions').then(function(sd){
      var sessions=sd.sessions||[],el=document.getElementById('listArea');
      if(curTab!=='agents')return;
      var list=(ad.agents||[]).map(function(a){
        var last=null;
        for(var i=0;i<sessions.length;i++){if(sessions[i].agentName===a.name){last=sessions[i];break;}}
        return{
          title:a.name,sub:(last?'Last: '+new Date(last.updatedAt).toLocaleString():'Memory: '+(a.memorySize||50)),
          _active:curAgent===a.name&&!curPipe,
          del: a.isCustom ? "delAgent("+a.id+",'"+esc(a.name)+"')" : null,
          onclick:function(){
            curAgent=a.name;curPipe=null;updateModelBar();
            var found=null;
            for(var i=0;i<sessions.length;i++){if(sessions[i].agentName===curAgent){found=sessions[i];break;}}
            if(found){curSess=found.id;loadMsgs();loadArtifacts()}else{curSess=null;showEmpty()}
            loadAgents();
          }
        };
      });
      if(list.length===0){el.innerHTML='<div class="list-hint">'+T('noAgents')+'</div>';return}
      renderList(list);
    });
  });
}
function delAgent(id,name){
  askConfirm(T('deleteAgentConfirm'),'"'+name+'" '+T('deleteAgentWarn'),function(){
    api('DELETE','/api/agents/id/'+id).then(function(d){
      if(!d.success){toast(d.error||'Failed','error');return}
      if(curAgent===name){curAgent=null;curSess=null;curPipe=null;updateModelBar();showEmpty()}
      loadAgents();loadSessions();toast(T('agentDeleted'),'success');
    });
  });
}

// ============ PIPELINES ============
var _pipeConfigs={};
function loadPipes(){
  api('GET','/api/pipelines').then(function(d){
    var el=document.getElementById('listArea');
    if(curTab!=='pipes')return;
    // Cache configs for @mention lookup
    _pipeConfigs={};(d.pipelines||[]).forEach(function(p){_pipeConfigs[p.name]=p});
    var list=(d.pipelines||[]).map(function(p){
      return{
        title:p.name,sub:p.description||'',typeBadge:p.type,typeCls:typeClass(p.type),
        _active:curPipe===p.name,
        onclick:function(){curPipe=p.name;curAgent=null;curSess=null;updateModelBar();showEmpty();loadPipes()},
        del:"delPipe("+p.id+")"
      };
    });
    if(list.length===0){el.innerHTML='<div class="list-hint">'+T('noPipes')+'</div>';return}
    renderList(list);
  });
}
function delPipe(id){
  askConfirm(T('deletePipeConfirm'),T('deletePipeWarn'),function(){
    api('DELETE','/api/pipelines/'+id).then(function(){
      if(curPipe){curPipe=null;curSess=null;updateModelBar();showEmpty()}
      loadPipes();toast(T('pipeDeleted'),'success');
    });
  });
}

// ============ PERSONAS ============
function loadPersonas(){
  api('GET','/api/personas').then(function(d){
    var list=d.personas||[],el=document.getElementById('listArea');
    if(curTab!=='personas')return;
    el.innerHTML='';
    if(!curAgent){el.innerHTML='<div class="list-hint">'+T('noPersonas')+'</div>';return}
    var h='<div style="padding:8px 12px;color:var(--dim);font-size:11px">'+T('applyPersona')+' <b>'+esc(curAgent)+'</b></div>';
    if(activePersona)h+='<div style="padding:2px 12px"><span class="persona-indicator">🎭 '+esc(activePersona)+'</span></div>';
    el.innerHTML=h;
    var grid=document.createElement('div');
    grid.style.cssText='display:flex;flex-direction:column;gap:6px;padding:4px 10px';
    list.forEach(function(p){
      var card=document.createElement('div');
      card.className='persona-card'+(activePersona===p.displayName?' active':'');
      var desc=(p.systemPrompt||'').substring(0,80);
      card.innerHTML='<div class="persona-name">🎭 '+esc(p.displayName||p.name)+'</div><div class="persona-desc" style="max-width:100%;white-space:normal;line-height:1.4">'+esc(desc)+(desc.length>=80?'...':'')+'</div>';
      card.title=p.systemPrompt||'';
      card.style.cursor='pointer';
      card.onclick=function(){
        if(!curAgent){toast(T('noSelect'),'error');return}
        api('POST','/api/personas/apply',{agentName:curAgent,personaName:p.name}).then(function(r){
          if(r.success){activePersona=p.displayName||p.name;toast(T('personaApply'),'success');loadPersonas()}
          else toast(r.error||'Failed','error');
        });
      };
      grid.appendChild(card);
    });
    el.appendChild(grid);
  });
}

function updateModelBar(){
  var bar=document.getElementById('modelBar'),ind=document.getElementById('modeIndicator'),sel=document.getElementById('modelSelect');
  var mbar=document.getElementById('mentionBar');
  if(!curAgent&&!curPipe){bar.style.display='none';mbar.className='mention-bar';return}
  bar.style.display='flex';
  if(curPipe){ind.innerHTML='<span class="pipe-badge">🔀 '+esc(curPipe)+'</span>'}
  else{ind.innerHTML='<span style="color:var(--text);font-weight:600">🤖 '+esc(curAgent||'')+'</span>'}
  // Show @mention bar for multi-agent pipelines (groupchat, broadcast)
  function renderMentionBar(){
    if(!curPipe){mbar.className='mention-bar';return}
    var cfg=_pipeConfigs[curPipe];
    if(cfg&&(cfg.type==='groupchat'||cfg.type==='broadcast')){
      showMentionChips(cfg);
    }else{
      // Config not cached yet — fetch from API
      api('GET','/api/pipelines').then(function(d){(d.pipelines||[]).forEach(function(p){_pipeConfigs[p.name]=p});
        var c=_pipeConfigs[curPipe];
        if(c&&(c.type==='groupchat'||c.type==='broadcast'))showMentionChips(c);else mbar.className='mention-bar';
      });
    }
  }
  function showMentionChips(cfg){
    var agents=[];
    try{var cj=JSON.parse(cfg.configJson||'{}');agents=cj.agents||[]}catch(e){}
    if(agents.length>0){
      var h='<span class="mention-label">@</span>';
      agents.forEach(function(a){h+='<span class="mention-chip" onclick="insertMention(\''+esc(a)+'\')" title="'+T('atMention')+' '+esc(a)+'"><span class="mc-dot" style="background:'+agentColor(a)+'"></span>'+esc(a)+'</span>'});
      mbar.innerHTML=h;mbar.className='mention-bar active';
    }else{mbar.className='mention-bar'}
  }
  renderMentionBar();
  // Load models for dropdown
  api('GET','/api/models').then(function(d){
    var models=d.models||[];sel.innerHTML='';
    models.forEach(function(m){
      var opt=document.createElement('option');opt.value=m.name;opt.textContent=m.name;sel.appendChild(opt);
    });
    if(!curModel&&models.length>0)curModel=models[0].name;
    sel.value=curModel||'';
  });
}
function switchModel(name){curModel=name;}
function insertMention(name){
  var inp=document.getElementById('msgInput');
  var before=inp.value.substring(0,inp.selectionStart||0);
  var after=inp.value.substring(inp.selectionEnd||0);
  var mention='@'+name+' ';
  // Don't duplicate if already at cursor
  if(before.endsWith(mention))return;
  inp.value=before+mention+after;
  var pos=(before+mention).length;
  inp.setSelectionRange(pos,pos);
  inp.focus();
}

function loadMsgs(){
  if(!curSess)return;
  api('GET','/api/sessions/'+curSess+'/messages').then(function(d){
    var msgs=d.messages||[],area=document.getElementById('chatArea');area.innerHTML='';
    msgs.forEach(function(m){
      area.appendChild(renderMsg(m));
    });
    area.scrollTop=area.scrollHeight;
  });
}

function renderMsg(m){
  var role=m.role||'user';
  var div=document.createElement('div');div.className='msg '+role;
  // Avatar
  if(role==='assistant'){
    var ava=document.createElement('div');ava.className='avatar';
    ava.style.background=agentColor(m.agentName||'A');
    ava.textContent=(m.agentName||'A').charAt(0);
    div.appendChild(ava);
  }
  // Body
  var body=document.createElement('div');body.className='msg-body';
  var bubble=document.createElement('div');bubble.className='bubble';
  bubble.innerHTML=renderMarkdown(m.content||'');
  // Code copy buttons
  var codes=bubble.querySelectorAll('pre');
  codes.forEach(function(pre){
    pre.style.position='relative';
    var lang=document.createElement('span');lang.className='code-lang';
    var codeEl=pre.querySelector('code');
    if(codeEl&&codeEl.className){lang.textContent=codeEl.className.replace('language-','')}
    pre.appendChild(lang);
    var btn=document.createElement('button');btn.className='copy-code';btn.textContent='📋';
    btn.onclick=function(){
      navigator.clipboard.writeText(codeEl?codeEl.textContent:pre.textContent).then(function(){toast(T('copied'),'success')});
    };
    pre.appendChild(btn);
  });
  body.appendChild(bubble);
  // Meta
  if(m.elapsedMs||m.agentName){
    var mt=document.createElement('div');mt.className='meta';
    mt.textContent=(m.agentName||'')+(m.elapsedMs?' · '+(m.elapsedMs<1000?m.elapsedMs+'ms':(m.elapsedMs/1000).toFixed(1)+'s'):'');
    body.appendChild(mt);
  }
  div.appendChild(body);
  return div;
}

// ============ SIMPLE MARKDOWN RENDERER ============
function renderMarkdown(text){
  if(!text)return '';
  var html=esc(text);
  // Fenced code blocks
  html=html.replace(/```(\w*)\n([\s\S]*?)```/g,function(_,lang,code){
    return '<pre><code class="language-'+(lang||'')+'">'+code.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code></pre>';
  });
  // Inline code
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Bold & Italic
  html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Headings
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Unordered lists
  html=html.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');
  html=html.replace(/(<li>.*<\/li>)/s,function(m){return '<ul>'+m+'</ul>'});
  // Ordered lists
  html=html.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  // Blockquotes
  html=html.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // Horizontal rules
  html=html.replace(/^---$/gm,'<hr>');
  // Links
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  // Line breaks
  html=html.replace(/\n\n/g,'</p><p>');
  html=html.replace(/\n/g,'<br>');
  return '<p>'+html+'</p>';
}

// ============ SEND ============
function send(){
  var msg=document.getElementById('msgInput').value.trim();
  if(!msg)return;if(!curAgent&&!curPipe){alert(T('noSelect'));return}
  var inp=document.getElementById('msgInput'),btn=document.getElementById('sendBtn');
  inp.disabled=true;btn.disabled=true;

  function doSend(){
    var area=document.getElementById('chatArea');
    // User bubble
    var ub=document.createElement('div');ub.className='msg user';
    ub.innerHTML='<div class="msg-body"><div class="bubble">'+esc(msg)+'</div></div>';
    area.appendChild(ub);
    // Typing indicator
    var typing=document.createElement('div');typing.className='typing-indicator';typing.id='typingNow';
    typing.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div> '+T('thinking');
    area.appendChild(typing);area.scrollTop=area.scrollHeight;

    var body={message:msg,agentName:curAgent||curPipe||'Assistant'};
    if(curPipe)body.pipelineName=curPipe;
    if(curSess)body.sessionId=curSess;

    function doPost(){
      api('POST','/api/chat',body).then(function(d){
        var t=document.getElementById('typingNow');if(t)t.remove();
        inp.value='';inp.disabled=false;btn.disabled=false;inp.focus();
        if(d.sessionId)curSess=d.sessionId;
        if(d.error){toast(d.error,'error');return}
        pendingFiles=[];renderFileStrip();
        loadMsgs();loadArtifacts();
      }).catch(function(e){
        var t=document.getElementById('typingNow');if(t)t.remove();
        inp.disabled=false;btn.disabled=false;
        toast('Error: '+e.message,'error');
      });
    }

    if(pendingFiles.length>0){
      sendFileContext().then(function(ctx){body.message=body.message+'\n\n'+ctx;doPost()});
    }else{doPost()}
  }

  if(!curSess){
    var sb={agentName:(curPipe||curAgent)||'Assistant'};
    if(curPipe)sb.pipelineName=curPipe;
    api('POST','/api/sessions',sb).then(function(d){curSess=d.id;updateModelBar();doSend()});
  }else{doSend()}
}

function selectPipeType(type){
  _pipeType=type;
  document.querySelectorAll('.pipe-type-card').forEach(function(c){c.classList.remove('selected')});
  var card=document.getElementById('ptc-'+type);if(card)card.classList.add('selected');
  updatePipeForm();
}
function updatePipeForm(){
  var cfg=document.getElementById('pp-cfg'),ag=document.getElementById('pp-agents'),
    label=document.getElementById('pp-agents-label'),flow=document.getElementById('pp-flow');
  if(!cfg)return;
  if(_pipeType==='loop'){
    cfg.innerHTML='<div class="config-row"><div><label>'+T('maxIterations')+'</label><input type="number" id="pp-mi" value="20" min="1" max="100" onchange="renderPipeFlow()"></div><div><label>'+T('exitCondition')+'</label><select id="pp-ec" onchange="onEcChange()"><option value="done">'+T('exitCondDone')+'</option><option value="pass">'+T('exitCondPass')+'</option><option value="custom">'+T('exitCondCustom')+'</option></select><input id="pp-ec-custom" style="display:none;margin-top:4px" placeholder="keyword..." oninput="renderPipeFlow()"></div></div>';
    label.textContent=T('selectAgent');
    renderAgentPicker();
  }else if(_pipeType==='ifelse'){
    cfg.innerHTML='<label>'+T('conditionVar')+'</label><input id="pp-cv" value="route.condition" oninput="renderPipeFlow()"><div class="config-row"><div><label>'+T('thenAgent')+'</label><select id="pp-then" onchange="renderPipeFlow()"><option value="">-- '+T('selectAgent')+' --</option></select></div><div><label>'+T('elseAgent')+'</label><select id="pp-else" onchange="renderPipeFlow()"><option value="">-- '+T('selectAgent')+' --</option></select></div></div>';
    _pipeAllAgents.forEach(function(a){document.getElementById('pp-then').insertAdjacentHTML('beforeend','<option value="'+esc(a.name)+'">'+esc(a.name)+'</option>');document.getElementById('pp-else').insertAdjacentHTML('beforeend','<option value="'+esc(a.name)+'">'+esc(a.name)+'</option>')});
    label.textContent='';ag.innerHTML='';renderPipeFlow();

    cfg.innerHTML='<div class="hint">📢 '+T('pipeTypeBcastDesc')+'</div>';

    cfg.innerHTML='<div class="hint">👥 '+T('pipeTypeGcDesc')+'</div>';
    label.textContent=T('selectAgent');renderAgentGrid();
  }else{
    cfg.innerHTML='<div class="hint">🔀 '+T('pipeTypeSeqDesc')+'</div>';
    label.textContent=T('agentsOrder');renderAgentOrderList();
  }
}

function renderAgentOrderList(){
  var el=document.getElementById('pp-agents');if(!el)return;
  if(_pipeAllAgents.length===0){el.innerHTML='<div class="list-hint">'+T('noAgentsAvailable')+'</div>';renderPipeFlow();return}
  if(_pipeAgents.length===0){_pipeAgents=_pipeAllAgents.map(function(a){return a.name})}
  var h='<div class="agent-order-list">';
  _pipeAgents.forEach(function(name,idx){
    h+='<div class="agent-order-item"><span class="ao-handle" title="'+T('agentsOrder')+'">⋮⋮</span><span class="ao-idx">'+(idx+1)+'</span><span class="ao-dot" style="background:'+agentColor(name)+'"></span><span class="ao-name">'+esc(name)+'</span><div class="ao-btns">';
    h+='<button class="ao-btn" onclick="movePipeAgent('+idx+',-1)"'+((idx===0)?' disabled':'')+'>▲</button>';
    h+='<button class="ao-btn" onclick="movePipeAgent('+idx+',1)"'+((idx===_pipeAgents.length-1)?' disabled':'')+'>▼</button>';
    h+='<button class="ao-btn ao-rm" onclick="removePipeAgent('+idx+')" title="'+T('delete')+'">✕</button></div></div>';
  });
  h+='</div><div class="agent-order-hint">🖱 '+T('agentsOrder')+'</div>';el.innerHTML=h;renderPipeFlow();
}
function movePipeAgent(idx,dir){var newIdx=idx+dir;if(newIdx<0||newIdx>=_pipeAgents.length)return;var tmp=_pipeAgents[idx];_pipeAgents[idx]=_pipeAgents[newIdx];_pipeAgents[newIdx]=tmp;renderAgentOrderList()}
function removePipeAgent(idx){_pipeAgents.splice(idx,1);renderAgentOrderList()}
function renderPipeFlow(){
  var el=document.getElementById('pp-flow');if(!el)return;
  if(_pipeAgents.length===0&&_pipeType!=='ifelse'){el.innerHTML='<span class="flow-empty">'+T('selectAgent')+'</span>';return}
  var h='';
  if(_pipeType==='sequential'){
    _pipeAgents.forEach(function(name,idx){if(idx>0)h+='<span class="flow-arrow">→</span>';h+='<span class="flow-node"><span class="flow-dot" style="background:'+agentColor(name)+'"></span>'+esc(name)+'</span>'});
  }else if(_pipeType==='loop'){
    var name=_pipeAgents[0]||'?';
    h='<span class="flow-node"><span class="flow-dot" style="background:'+agentColor(name)+'"></span>'+esc(name)+'</span><span class="flow-arrow">⟳</span><span class="flow-node"><span class="flow-dot" style="background:'+agentColor(name)+'"></span>'+esc(name)+'</span><span class="flow-loop-label">×'+($V('pp-mi')||20)+'</span>';
  }else if(_pipeType==='broadcast'){
    h='<span class="flow-node">📢</span><span class="flow-arrow">→</span>';
    _pipeAgents.forEach(function(name,idx){if(idx>0)h+='<span class="flow-plus">+</span>';h+='<span class="flow-node"><span class="flow-dot" style="background:'+agentColor(name)+'"></span>'+esc(name)+'</span>'});
  }else if(_pipeType==='groupchat'){
    h='<span class="flow-node">👥</span><span class="flow-arrow">⇢</span>';
    _pipeAgents.forEach(function(name,idx){if(idx>0)h+='<span class="flow-plus">+</span>';h+='<span class="flow-node"><span class="flow-dot" style="background:'+agentColor(name)+'"></span>'+esc(name)+'</span>'});
    h+='<span class="flow-label" style="font-size:9px;color:var(--accent);margin-left:4px">🔄 共享上下文</span>';
  }else if(_pipeType==='ifelse'){
    var cv=$V('pp-cv')||'condition';
    var tn=document.getElementById('pp-then'),en=document.getElementById('pp-else');
    var thenName=tn?tn.value:'',elseName=en?en.value:'';
    h='<span class="flow-node">'+esc(cv)+'</span><span class="flow-arrow">?</span>';
    h+='<span class="flow-node" style="border-color:var(--green)"><span class="flow-dot" style="background:'+agentColor(thenName||'T')+'"></span>'+(thenName||'Then')+'</span>';
    h+='<span class="flow-node" style="border-color:var(--accent);margin-left:4px"><span class="flow-dot" style="background:'+agentColor(elseName||'E')+'"></span>'+(elseName||'Else')+'</span>';
  }
  el.innerHTML=h;
}
function createPipe(){
  var name=$V('pp-n'),type=_pipeType,desc=$V('pp-d');
  if(!name){alert(T('name')+' '+T('minOneAgent'));return}
  var config={};
  if(type==='loop'){
    if(_pipeAgents.length===0){alert(T('minOneAgent'));return}
    config.agents=_pipeAgents;
    config.maxIterations=parseInt($V('pp-mi'))||20;
    var ec=$V('pp-ec');
    config.exitCondition=ec==='custom'?($V('pp-ec-custom')||'done'):(ec||'done');
  }else if(type==='ifelse'){
    var cv=$V('pp-cv')||'route.condition';
    var thenVal=$V('pp-then'),elseVal=$V('pp-else');
    if(!thenVal&&!elseVal){alert(T('minOneAgent'));return}
    config.agents=[];config.conditionVariable=cv;
    config.thenAgents=thenVal?[thenVal]:[];
    config.elseAgents=elseVal?[elseVal]:[];
  }else if(type==='broadcast'){
    if(_pipeAgents.length===0){alert(T('minOneAgent'));return}
    config.agents=_pipeAgents.slice();
  }else if(type==='groupchat'){
    if(_pipeAgents.length===0){alert(T('minOneAgent'));return}
    config.agents=_pipeAgents.slice();
  }else{
    if(_pipeAgents.length===0){alert(T('minOneAgent'));return}
    config.agents=_pipeAgents.slice();
  }
  api('POST','/api/pipelines',{name:name,type:type,description:desc,configJson:JSON.stringify(config)}).then(function(){closeModal();loadPipes()});
}

// ============ CONFIRM ============
function askConfirm(title,msg,cb){
  _confirmCb=cb;
  var h='<div class="confirm-overlay" onclick="if(event.target===this)closeConfirm()"><div class="confirm-box">';
  h+='<span class="icon">⚠️</span>';
  h+='<div class="title">'+esc(title)+'</div>';
  h+='<div class="msg">'+esc(msg)+'</div>';
  h+='<div class="btns"><button class="cancel-btn" onclick="closeConfirm()">'+T('cancel')+'</button>';
  h+='<button class="del-btn" onclick="doConfirm()">'+T('delete')+'</button></div></div></div>';
  document.getElementById('modal').innerHTML=h;
}
function doConfirm(){if(_confirmCb){_confirmCb();_confirmCb=null}closeModal()}
function closeConfirm(){_confirmCb=null;closeModal()}

// ============ ARTIFACTS ============
function loadArtifacts(){
  if(!curSess)return;
  api('GET','/api/sessions/'+curSess+'/artifacts').then(function(d){
    var list=d.artifacts||[],area=document.getElementById('artifactArea');
    area.innerHTML='';
    if(list.length===0){area.style.display='none';return}
    area.style.display='flex';
    list.forEach(function(a){
      var btn=document.createElement('button');btn.className='artifact-btn';
      btn.innerHTML='📄 '+esc(a.title)+' <span class="artifact-tag">'+esc(a.artifactType)+'</span>';
      btn.onclick=function(){var w=window.open('','_blank');w.document.write('<pre style="padding:20px;font-size:14px;white-space:pre-wrap">'+esc(a.content)+'</pre>');w.document.title=a.title};
      area.appendChild(btn);
    });
    var gen=document.createElement('button');gen.className='artifact-btn';
    gen.innerHTML='✨ '+T('generateSummary');
    gen.onclick=function(){api('POST','/api/sessions/'+curSess+'/artifacts').then(function(r){if(r.success){toast(T('generateSummary')+' ✓','success');loadArtifacts()}else toast(r.error||'Failed','error')})};
    area.appendChild(gen);
  });
}

// ============ FILE UPLOAD ============
function handleFiles(files){
  if(!curSess){toast(T('startChatFirst'),'error');return}
  for(var i=0;i<files.length;i++){
    (function(f){
      var fd=new FormData();fd.append('file',f);
      var xhr=new XMLHttpRequest();
      xhr.open('POST','/api/sessions/'+curSess+'/files');
      xhr.onload=function(){
        if(xhr.status===200){
          var d=JSON.parse(xhr.responseText);
          if(d.success){pendingFiles.push({id:d.id,name:d.originalName,size:d.fileSize,type:d.contentType,hasText:d.hasTextContent});renderFileStrip();toast(T('uploaded')+d.originalName,'success')}
          else toast(d.error||T('uploadError'),'error');
        }else toast(T('uploadError'),'error');
      };
      xhr.send(fd);
    })(files[i]);
  }
  document.getElementById('fileInput').value='';
}
function renderFileStrip(){
  var strip=document.getElementById('fileStrip');
  if(pendingFiles.length===0){strip.className='file-strip';strip.innerHTML='';return}
  strip.className='file-strip active';strip.innerHTML='';
  pendingFiles.forEach(function(f,idx){
    var chip=document.createElement('div');chip.className='file-chip';
    chip.innerHTML='<span class="fname">'+esc(f.name)+'</span>'+(f.hasText?'<span class="file-badge">TXT</span>':'')+'<span class="remove" onclick="removePendingFile('+idx+')">×</span>';
    strip.appendChild(chip);
  });
}
function removePendingFile(idx){pendingFiles.splice(idx,1);renderFileStrip()}
function sendFileContext(){
  if(pendingFiles.length===0)return Promise.resolve('');
  var parts=[T('attachedFiles')];
  var proms=pendingFiles.map(function(f){
    return f.hasText?api('GET','/api/files/'+f.id+'/preview'):Promise.resolve(null);
  });
  return Promise.all(proms).then(function(results){
    results.forEach(function(r,i){
      if(!r)return;
      var name=r.originalName||pendingFiles[i].name||'file';
      parts.push('--- '+name+' ---\n'+(r.textContent||'').substring(0,8000));
    });
    return parts.join('\n\n');
  });
}

// ============ INIT ============
renderUI();
loadSessions();
switchTab('sessions');
</script>
