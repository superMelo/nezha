server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/nezha?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql, classpath:schema-memory.sql

nezha:
  models:
    - name: deepseek
      provider: deepseek
      apiKey: sk-a40c17b8b2ad4a8284dcb97aacbe36bb
      baseUrl: https://api.deepseek.com/v1
      model: deepseek-chat
      maxTokens: 4096
      temperature: 0.7
    - name: openai
      provider: openai
      apiKey: ${OPENAI_API_KEY:}
      baseUrl: https://api.openai.com/v1
      model: gpt-3.5-turbo
      maxTokens: 4096
      temperature: 0.7
    - name: claude
      provider: claude
      apiKey: ${CLAUDE_API_KEY:}
      baseUrl: https://api.anthropic.com/v1
      model: claude-3-sonnet-20240229
      maxTokens: 4096
      temperature: 0.7
    - name: qwen
      provider: qwen
      apiKey: ${QWEN_API_KEY:}
      baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-turbo
      maxTokens: 4096
      temperature: 0.7
